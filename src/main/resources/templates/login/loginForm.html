<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>BuBu Table - 로그인</title>
    <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">
    <link th:href="@{/css/bootstrap-icons.css}" rel="stylesheet">
    <link th:href="@{/css/member/joinForm.css}" rel="stylesheet">
    <style>
        .login-container { max-width: 450px; margin: 80px auto; }
        .btn-login { background-color: #ff6b6b; color: white; border: none; transition: 0.3s; }
        .btn-login:hover { background-color: #ee5253; color: white; }
        .social-login-btn { border: 1px solid #ddd; transition: 0.2s; }
        .social-login-btn:hover { background-color: #f8f9fa; }
    </style>
</head>
<body>

<div class="login-container p-3">
    <div class="text-center mb-4">
        <a href="/" class="logo-text h2 text-decoration-none" style="color: #ff6b6b; font-weight: bold;">
            <i class="bi bi-egg-fried"></i> BuBu Table
        </a>
        <p class="text-muted mt-2">오늘도 맛있는 하루 되세요! 🍳</p>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body p-5">
            <h4 class="text-center mb-4 fw-bold">로그인</h4>

            <form action="/api/user/login" method="post" id="loginForm">
                <div class="mb-3">
                    <label class="form-label small fw-bold">이메일 주소</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i class="bi bi-envelope text-muted"></i></span>
                        <input type="email" name="username" class="form-control border-start-0 ps-0" placeholder="example@email.com" required>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label small fw-bold">비밀번호</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock text-muted"></i></span>
                        <input type="password" name="password" class="form-control border-start-0 ps-0" placeholder="비밀번호를 입력하세요" required>
                    </div>
                </div>

                <div class="d-flex justify-content-between mb-4 small">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="rememberMe" name="remember-me">
                        <label class="form-check-label text-muted" for="rememberMe">로그인 유지</label>
                    </div>
                    <a href="#" class="text-decoration-none text-muted">비밀번호 찾기</a>
                </div>

                <button type="submit" class="btn btn-login w-100 py-2 mb-3 shadow-sm fw-bold">로그인</button>
            </form>

            <div class="text-center mt-3">
                <span class="text-muted small">아직 회원이 아니신가요?</span>
                <a th:href="@{/api/user/join}" class="small text-decoration-none ms-1 fw-bold" style="color: #ff6b6b;">회원가입하기</a>
            </div>
        </div>
    </div>

    <div class="text-center mt-4">
        <a href="/" class="text-muted small text-decoration-none"><i class="bi bi-arrow-left"></i> 홈으로 돌아가기</a>
    </div>
</div>

<div th:replace="~{common/modal :: commonModal}"></div>

<script th:src="@{/js/common/bootstrap.bundle.min.js}"></script>
<script th:src="@{/js/common/common.js}"></script>
<script>
    // 폼 요소 선택
    const loginForm = document.querySelector('#loginForm');

    loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();

        // 1. 시큐리티 규격에 맞춰 파라미터 구성
        const params = new URLSearchParams();
        params.append('username', loginForm.username.value);
        params.append('password', loginForm.password.value);

        try {
            const response = await fetch('/api/user/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                },
                body: params
            });

            // 2. SecurityConfig의 Success/Failure Handler가 보낸 JSON 읽기
            const result = await response.json();

            if (response.ok && result.success) {
                // ✅ 로그인 성공: 메인 화면으로 이동
                console.log("로그인 성공:", result.message);
                location.href = "/";
            } else {
                // ❌ 로그인 실패: 서버가 보낸 메시지 출력
                showAlert({
                    title: "로그인 실패 🧐",
                    message: result.message || "이메일 또는 비밀번호를 다시 확인해주세요.",
                    type: "error"
                });
            }
        } catch (error) {
            console.error("로그인 요청 중 에러:", error);
            showAlert({
                title: "서버 연결 오류",
                message: "통신 중 문제가 발생했습니다. 잠시 후 다시 시도해주세요.",
                type: "error"
            });
        }
    }); // 이 부분 괄호가 누락되어 있었어요!
</script>
</body>
</html>
