<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>커뮤니티 - 목록</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; font-family: 'Noto Sans KR', sans-serif; }
        .list-container { max-width: 1000px; margin: 50px auto; }
        .table-card { background: white; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); padding: 20px; }
        .table thead { border-bottom: 2px solid #f1f1f1; }
        .post-title { color: #333; text-decoration: none; transition: 0.2s; }
        .post-title:hover { color: #6c5ce7; font-weight: 500; }
        .page-link { color: #6c5ce7; border: none; margin: 0 3px; border-radius: 5px !important; }
        .page-item.active .page-link { background-color: #6c5ce7; color: white; }
    </style>
</head>
<body>

<div class="container list-container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="fw-bold">🤝 맞벌이 부부 소통함</h3>
        <a href="/community/write" class="btn btn-primary" style="background-color: #6c5ce7; border: none;">글쓰기</a>
    </div>

    <div class="table-card">
        <table class="table table-hover align-middle">
            <thead class="text-secondary small text-uppercase">
            <tr class="text-center">
                <th style="width: 8%">ID</th>
                <th style="width: 15%">카테고리</th>
                <th style="width: 47%">제목</th>
                <th style="width: 15%">작성자</th>
                <th style="width: 15%">작성일</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="post : ${posts}" class="text-center">
                <td th:text="${post.id}" class="text-muted small">1</td>
                <td><span class="badge bg-light text-primary fw-normal" th:text="${post.category.description}">고민상담</span></td>
                <td class="text-start">
                    <a th:href="@{/community/{id}(id=${post.id})}" class="post-title" th:text="${post.title}">게시글 제목</a>
                </td>
                <td th:text="${post.author.nickname}" class="small">닉네임</td>
                <td th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd')}" class="text-muted small">2026-02-22</td>
            </tr>
            </tbody>
        </table>

        <nav th:if="${posts.totalPages > 0}" aria-label="Page navigation" class="mt-4">
            <ul class="pagination justify-content-center">
                <li class="page-item" th:classappend="${posts.first} ? 'disabled'">
                    <a class="page-link" th:href="@{/community(page=${posts.number - 1})}" aria-label="Previous">
                        <span aria-hidden="true">&laquo;</span>
                    </a>
                </li>

                <li th:each="page : ${#numbers.sequence(startPage, endPage)}"
                    th:classappend="${page == nowPage} ? 'active'" class="page-item">
                    <a class="page-link" th:text="${page}" th:href="@{/community(page=${page - 1})}">1</a>
                </li>

                <li class="page-item" th:classappend="${posts.last} ? 'disabled'">
                    <a class="page-link" th:href="@{/community(page=${posts.number + 1})}" aria-label="Next">
                        <span aria-hidden="true">&raquo;</span>
                    </a>
                </li>
            </ul>
        </nav>
    </div>
</div>

</body>
</html>
