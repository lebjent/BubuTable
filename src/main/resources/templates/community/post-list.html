<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <th:block th:replace="~{common/fragments :: header-shell}"></th:block>
    <meta charset="UTF-8">
    <title>커뮤니티 - 목록</title>
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Noto Sans KR', sans-serif;
            /* 2. 푸터를 바닥으로 밀어내기 위한 설정 */
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            margin: 0;
        }

        .list-container {
            max-width: 1000px;
            margin: 50px auto;
            /* 3. 본문 영역이 남은 공간을 모두 차지함 */
            flex: 1;
            width: 100%;
        }

        .table-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
            padding: 20px;
            /* 4. 리스트 최소 높이 확보 */
            min-height: 600px;
            display: flex;
            flex-direction: column;
        }

        .table-responsive {
            /* 데이터가 많을 때 내부 스크롤이 아닌 카드 높이에 맞게 유연하게 설정 */
            flex: 1;
        }

        /* 포인트 컬러를 공통 변수인 --primary-color로 통일 */
        .post-title { color: #333; text-decoration: none; transition: 0.2s; }
        .post-title:hover { color: var(--primary-color) !important; font-weight: 500; }
        .page-link { color: var(--primary-color) !important; border: none; margin: 0 3px; border-radius: 5px !important; }
        /* 현재 페이지 버튼의 배경색과 글자색 설정 */
        .page-item.active .page-link {
            background-color: var(--primary-color) !important;
            color: white !important; /* 👈 글자색을 하얀색으로 강제 지정 */
            border: none;
        }

        .badge-category { color: var(--primary-color) !important; background-color: #fff5f5; }
    </style>
</head>
<body>

<div th:replace="~{common/fragments :: navbar}"></div>

<div class="container list-container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3 class="fw-bold">🤝 맞벌이 부부 소통함</h3>
        <a href="/community/write" class="btn px-4 shadow-sm" style="background-color: var(--primary-color); color: white; border: none;">글쓰기</a>
    </div>

    <div class="table-card shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead class="text-secondary small text-uppercase">
                <tr class="text-center">
                    <th style="width: 8%">ID</th>
                    <th style="width: 15%">카테고리</th>
                    <th style="width: 47%">제목</th>
                    <th style="width: 15%">작성자</th>
                    <th style="width: 15%">작성일</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="post : ${posts}" class="text-center">
                    <td th:text="${post.id}" class="text-muted small">1</td>
                    <td><span class="badge badge-category fw-normal" th:text="${post.category.description}">고민상담</span></td>
                    <td class="text-start">
                        <a th:href="@{/community/{id}(id=${post.id})}" class="post-title" th:text="${post.title}">게시글 제목</a>
                    </td>
                    <td th:text="${post.author.nickname}" class="small">닉네임</td>
                    <td th:text="${#temporals.format(post.createdAt, 'yyyy-MM-dd')}" class="text-muted small">2026-03-29</td>
                </tr>
                <tr th:if="${posts.totalElements == 0}">
                    <td colspan="5" class="text-center py-5 text-muted">아직 등록된 게시글이 없어요. 첫 글의 주인공이 되어보세요! 🍳</td>
                </tr>
                </tbody>
            </table>
        </div>

        <nav th:if="${posts.totalPages > 0}" aria-label="Page navigation" class="mt-auto pt-4">
            <ul class="pagination justify-content-center mb-0">
                <li class="page-item" th:classappend="${posts.first} ? 'disabled'">
                    <a class="page-link" th:href="@{/community(page=${posts.number - 1})}" aria-label="Previous">
                        <span aria-hidden="true">&laquo;</span>
                    </a>
                </li>

                <li th:each="page : ${#numbers.sequence(startPage, endPage)}"
                    th:classappend="${page == nowPage} ? 'active'" class="page-item">
                    <a class="page-link" th:text="${page}" th:href="@{/community(page=${page - 1})}">1</a>
                </li>

                <li class="page-item" th:classappend="${posts.last} ? 'disabled'">
                    <a class="page-link" th:href="@{/community(page=${posts.number + 1})}" aria-label="Next">
                        <span aria-hidden="true">&raquo;</span>
                    </a>
                </li>
            </ul>
        </nav>
    </div>
</div>

<div th:replace="~{common/fragments :: footer}"></div>
<div th:replace="~{common/modal :: commonModal}"></div>

</body>
</html>
