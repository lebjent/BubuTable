<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:fragment="header-shell">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">
    <link th:href="@{/css/bootstrap-icons.css}" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #ff6b6b; /* 따뜻한 다홍색 */
            --secondary-color: #f7d794;
        }
        .hero-section {
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
                        url('https://images.unsplash.com/photo-1556910103-1c02745aae4d?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-position: center;
            color: white;
            padding: 120px 0;
            text-align: center;
        }
        .btn-recipe {
            background-color: var(--primary-color);
            border: none;
            color: white;
        }
        .btn-recipe:hover {
            background-color: #ee5253;
            color: white;
        }
        .recipe-card:hover {
            transform: scale(1.02);
            transition: 0.3s;
        }
    </style>
</head>

<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/" style="color: var(--primary-color);">
            <i class="bi bi-egg-fried"></i> BuBu Table
        </a>
        <div class="navbar-nav me-auto">
            <a class="nav-link" href="/recipes">레시피 추천</a>
            <a class="nav-link" href="/community">BuBu커뮤니티</a>
        </div>
        <div class="navbar-nav ms-auto">
            <div sec:authorize="isAnonymous()">
                <a class="nav-link d-inline-block" th:href="@{/api/user/join}">회원가입</a>
                <a class="nav-link d-inline-block" th:href="@{/login}">로그인</a>
            </div>
            <div sec:authorize="isAuthenticated()">
                <span class="nav-link fw-bold d-inline-block" style="color: var(--primary-color);">
                    <i class="bi bi-person-circle"></i>
                    <span sec:authentication="principal.nickname">닉네임</span> 요리사님
                </span>
                <a class="nav-link d-inline-block" th:href="@{/logout}">로그아웃</a>
            </div>
        </div>
    </div>
</nav>

<footer th:fragment="footer" class="text-center py-5 border-top bg-white">
    <div class="container">
        <p class="text-muted mb-0">© 2026 HoneyCook - 맞벌이 신혼부부를 위한 주방 비서</p>
    </div>
</footer>

</html>
