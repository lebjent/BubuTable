spring:
  application:
    name: app

  # [Java 21의 핵심] 가상 스레드 활성화
  threads:
    virtual:
      enabled: true

  # 데이터베이스 연결 설정
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/DPRO?serverTimezone=Asia/Seoul&useSSL=false&allowPublicKeyRetrieval=true
    username: dpro
    password: 1234

  # JPA / Hibernate 설정
  jpa:
    hibernate:
      # 1. 일단 다시 'update'로 바꿔서 하이버네이트가 직접 테이블을 관리하게 해.
      ddl-auto: update
    properties:
      hibernate:
        # 2. 하이버네이트 6 버전에서 MySQL 5.7을 쓸 때 발생하는 물리적 명명 규칙 충돌 방지
        physical_naming_strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
        # 3. 테이블 이름을 찾을 때 따옴표 처리를 해서 예약어 충돌이나 대소문자 문제를 방어해.
        globally_quoted_identifiers: true
        format_sql: true
    show-sql: true

  # Thymeleaf 설정
  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html

server:
  port: 8090
  tomcat:
    threads:
      max: 200 # 가상 스레드 사용 시 이 수치는 매우 널널해짐